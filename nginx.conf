upstream nuxt_app {
    server app:3000;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name blue.home.com;

    ssl_certificate /etc/ssl/certs/blue.home.com.crt;
    ssl_certificate_key /etc/ssl/certs/blue.home.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Dynamic build manifests - must go to Nitro (order matters - this must be before /_nuxt/)
    location /_nuxt/builds/ {
        proxy_pass http://nuxt_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets - serve directly (more general, comes after specific paths)
    location /_nuxt/ {
        alias /app/.output/public/_nuxt/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve other public assets (favicon, robots.txt, etc.)
    location ~* ^/(favicon\.ico|robots\.txt|logo\.svg)$ {
        root /app/.output/public;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Everything else goes to Nitro
    location / {
        proxy_pass http://nuxt_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Cookie handling
        proxy_pass_header Set-Cookie;
        proxy_cookie_domain localhost $host;
        proxy_cookie_domain app $host;
        proxy_cookie_path / "/; SameSite=Lax";
    }
}