upstream nuxt_app {
    server app:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;  # Accepts any hostname or IP

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Serve static assets directly — bypasses Nitro entirely (fixes the 2.12.x bug)
    location /_nuxt/ {
        alias /app/.output/public/_nuxt/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve other public assets (favicon, robots.txt, etc.)
    location ~* ^/(favicon\.ico|robots\.txt|logo\.svg)$ {
        root /app/.output/public;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Everything else goes to Nitro
    location / {
        proxy_pass http://nuxt_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
