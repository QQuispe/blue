# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# Features: Optimized build, Nginx reverse proxy, no volume mounts, production mode

services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80' # HTTP — change to '443:443' when you add HTTPS later
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /Users/qq/.certs/blue.home.com.crt:/etc/ssl/certs/blue.home.com.crt:ro
      - /Users/qq/.certs/blue.home.com.key:/etc/ssl/certs/blue.home.com.key:ro
      - app_output:/app/.output/public:ro # shared volume for static files
    depends_on:
      - app
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    # No ports exposed to host — only Nginx can reach it
    expose:
      - '3000'
    volumes:
      - app_output:/app/.output/public # Nginx reads from here
    environment:
      - NODE_ENV=production
      - HTTPS_ENABLED=false # set to 'true' when you add HTTPS/TLS
      - DATABASE_URI=${DATABASE_URI}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_ENV=${PLAID_ENV}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - DEV_MODE=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/db/schema.health.sql:/docker-entrypoint-initdb.d/02-schema.health.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  app_output: # shared between app and nginx for static file serving
